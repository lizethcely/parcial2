const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");


/*unica funcion permitida
Parametros x, y: coordenadas del pixel a dibujar
Parametros color: color del pixel a dibujar
*/

function plotPixel(x, y, color = "#000") {
    ctx.fillStyle = color;
    ctx.fillRect(Math.floor(x), Math.floor(y), 1, 1);
}

/**Algoritmo de Bressenham para dibujar la linea
*Parametros x0, y0: coordenadas del punto inical
Parametros x1, y1: coordenadas del punto final
parametros color: color de la linea en este caso rosa
*/
  function bresenhamLine(x0, y0, x1, y1, color="#FFC0CB") {
            let dx = Math.abs(x1 - x0);
            let dy = Math.abs(y1 - y0);

            let sx = (x0 < x1) ? 1 : -1; //determina la direccion del paso en x
            let sy = (y0 < y1) ? 1 : -1;//deteermina la direccion del paso en y

            let err= dx-dy; //parametro de decision

    //bucle para recorrer la linea punto por punto hasta llegar al punto final
         while (true) {
             plotPixel(x0, y0, color);

           if (x0 === x1 && y0 === y1) break;
            let e2=2 * err;
           if (e2 > -dy) {
            err -= dy;
            x0 += sx;
        }if (e2 < dx) {
            err += dx;
            y0 += sy;
        }
    }
}

/*algoritmo de punto medio para circunferencias
Parametros cx, cy: coordenadas del centro de la circunferencia
Parametros r: radio de la circunferencia
Parametros color: color de la circunferencia en este caso gris
*/
function midpointCircle(cx, cy, r, color="#FFC0CB") {
      let x = 0;
      let y = r;
      let p = 1 - r; // parametro de desicion inicial
        while (x <= y) {
            //dibujar los 8 puntos simetricos de la circunferencia
            plotPixel(cx + x, cy + y, color);
            plotPixel(cx - x, cy + y, color);
            plotPixel(cx + x, cy - y, color);
            plotPixel(cx - x, cy - y, color);
            plotPixel(cx + y, cy + x, color);
            plotPixel(cx - y, cy + x, color);
            plotPixel(cx + y, cy - x, color);
            plotPixel(cx - y, cy - x, color);
    
            if (p < 0) {
                p+=2*x+3; // decision para elegir el siguiente punto
            } else {
                p+=2*(x-y)+5; // decision para elegir el siguiente punto
                y--;
            }
            x++;
        }
}

/*Funcion para calcular los vertices de un poligono regular
Parametros cx, cy: coordenadas del centro del poligono
Parametros r: radio del poligono (distancia desde el centro a un vertice)
Parametros n: numero de vertices del poligono
*/
function getPolygonVertices(cx, cy, r, n) {
    let vertices = [];

    for (let i = 0; i <n; i++) { //recorre cada vertice del poligono
        let angle = (2 * Math.PI * i) /n; //calcula el angulo para cada vertice
        let x=cx+r*Math.cos(angle);
        let y=cy+r*Math.sin(angle);

        vertices.push({ x, y });//agrega el vertice al arreglo de vertices
    }
    return vertices;
}

/*Funcion para dibujar un poligono dado sus vertices
Parametros vertices: arreglo de objetos con las coordenadas de los vertices del poligono
Parametros color: color del poligono
*/
function drawPolygon(vertices, color = "#FF69B4") {
    for (let i = 0; i < vertices.length; i++) { //recorre cada vertice del poligono
        let p1 = vertices[i];
        let p2 = vertices[(i + 1) % vertices.length];

        bresenhamLine(  //dibuja una linea entre el vertice actual y el siguiente vertice 
            Math.round(p1.x),
            Math.round(p1.y),
            Math.round(p2.x),
            Math.round(p2.y),
            color
        );
    }
}

/*Funcion para calcular la posicion de un objeto en una orbita circular
Parametros cx, cy: coordenadas del centro de la orbita
Parametros r: radio de la orbita            
Parametros n: numero de posiciones a calcular (puede representar el tiempo o el numero de frames)
*/
function getOrbitalPositions(cx, cy, r, n) {
let positions = [];
 for (let i = 0; i < n; i++) {
        let angle = (2 * Math.PI * i) / n; //calcula el angulo para cada posicion en la orbita

        let x = cx + r * Math.cos(angle); //calcula la coordenada x de la posicion en la orbita
        let y = cy + r * Math.sin(angle); //calcula la coordenada y de la posicion en la orbita

        positions.push({ x, y });
    }
return positions;
}
/*Funcion principal para dibujar la escena completa
Dibuja una orbita circular y coloca varios poligonos regulares a lo largo de la orbita utilizando las funciones anteriores
*/  
function drawScene() {
    const cx=300;
    const cy=300;

    const R=180; //radio orbita
    const N=6;   //cantidad de polígonos
    const sides=5;//lados del polígono
    const polyR=30;

    midpointCircle(cx, cy, R, "#bbb"); // dibujar orbita

    const positions = getOrbitalPositions(cx, cy, R, N);// calcular posiciones de los poligonos a lo largo de la orbita

    // dibujar poligonos
    positions.forEach(pos => {
        let vertices = getPolygonVertices(pos.x, pos.y, polyR, sides);
        drawPolygon(vertices, "#000");
    });
}

drawScene(); //llamar a la funcion para dibujar la escena completa
